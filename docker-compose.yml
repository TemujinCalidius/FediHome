version: '3.8'

services:
  app:
    build: .
    ports:
      # Host port is configurable (FEDIHOME_PORT); the container always listens on 3000.
      - "${FEDIHOME_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=postgresql://fedihome:fedihome@db:5432/fedihome
    env_file:
      - .env.local
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fedihome
      POSTGRES_USER: fedihome
      POSTGRES_PASSWORD: fedihome
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fedihome"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
