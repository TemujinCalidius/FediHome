name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Generate the Prisma client so the typecheck can resolve @prisma/client.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      # A production build catches Next-specific breakage that tsc misses
      # (server/client boundaries, route config) and that `npm run update`
      # would otherwise hit on deploy. Most routes are force-dynamic, so a
      # placeholder DATABASE_URL is enough — the build doesn't connect.
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/fedihome
          SITE_URL: http://localhost:3000
